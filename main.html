<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BossMode — VPNBoss · Tunnels · Nodes · Sessions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.9.0/dist/ethers.umd.min.js"></script>
  <style>
    :root {
      --bg: #0a0e14;
      --bg-panel: #0f1419;
      --bg-hover: #151b24;
      --border: #1e2836;
      --accent: #39bae6;
      --accent-dim: #59c2e8;
      --green: #7fd962;
      --amber: #ffb454;
      --red: #f07178;
      --text: #e6e1cf;
      --text-dim: #626a73;
      --glow: rgba(57, 186, 230, 0.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap { max-width: 1000px; margin: 0 auto; padding: 1.5rem; }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1rem;
    }
    .logo {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 1.6rem;
      color: var(--accent);
      letter-spacing: 0.02em;
    }
    .tagline { font-size: 0.8rem; color: var(--text-dim); margin-top: 0.25rem; }
    .header-right { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    .addr { font-family: 'Space Mono', monospace; font-size: 0.8rem; color: var(--green); max-width: 140px; overflow: hidden; text-overflow: ellipsis; }
    input.contract { width: 220px; padding: 0.45rem 0.6rem; font-family: 'Space Mono', monospace; font-size: 0.8rem; background: var(--bg-panel); border: 1px solid var(--border); color: var(--text); border-radius: 4px; }
    .btn {
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      background: var(--bg-panel);
      color: var(--text);
      cursor: pointer;
      border-radius: 6px;
      font-size: 0.9rem;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn.primary { background: var(--accent-dim); border-color: var(--accent); color: var(--bg); }
    .btn.primary:hover { filter: brightness(1.1); box-shadow: 0 0 12px var(--glow); }
    .btn.small { padding: 0.35rem 0.6rem; font-size: 0.8rem; }
    .btn.danger { border-color: var(--red); color: var(--red); }
    .btn.danger:hover { background: rgba(240,113,120,0.1); }
    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 1.25rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
      padding: 0.85rem;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .stats span { color: var(--text-dim); }
    .stats strong { color: var(--accent); margin-right: 0.25rem; font-family: 'Space Mono', monospace; }
    .tabs { display: flex; flex-wrap: wrap; gap: 0.25rem; margin-bottom: 1rem; }
    .tab { padding: 0.5rem 1rem; background: var(--bg-panel); border: 1px solid var(--border); color: var(--text-dim); cursor: pointer; border-radius: 6px; font-size: 0.9rem; }
